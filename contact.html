    <!DOCTYPE html>
    <html lang="ru">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Контакты</title>
    <style>
    main {
      flex: 1;
      max-width: 900px;
      margin: 40px auto;
      background: var(--color-background);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.07);
      padding: 40px 30px;
    }
    
    h1 {
      margin-top: 0;
      color: var(--color-header-text);
      text-align: center;
      font-weight: 700;
      font-size: 2.5rem;
    }
    
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin: 30px 0;
    }
    
    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.1rem;
    }
    
    .contact-item svg {
      fill: var(--color-primary-light);
      flex-shrink: 0;
      width: 28px;
      height: 28px;
    }
    
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--color-primary-dark);
    }
    
    input[type="text"],
    input[type="email"],
    textarea {
      padding: 12px 15px;
      border: 1.5px solid var(--color-filter-border);
      border-radius: 12px;
      font-size: 1rem;
      resize: vertical;
      transition: border-color 0.3s ease;
      background: var(--color-background);
      color: var(--color-text);
    }
    
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--color-button-bg);
      outline: none;
    }
    
    textarea {
      min-height: 100px;
    }
    
    button.submit-btn {
      align-self: flex-start;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 12px 28px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    
    button.submit-btn:hover {
      background: var(--color-primary-light);
    }
    
    footer {
      text-align: center;
      padding: 20px 10px;
      font-size: 14px;
      color: #777;
    }
    
    </style>
    </head>
    <body>
     <div class="container">
        <header>
      <div class="logo">BUKETERIA</div>
      <div class="location">📍 Казань ▼</div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="about.html">О сервисе</a>
        <a href="#">Доставка</a>
        <a href="cart.html">Корзина</a>
        <a href="register.html">Вход</a>
      </nav>
    
    
      <!-- Бургер-меню для мобильных -->
    <div class="burger-wrapper">
      <button class="burger-menu" aria-label="Меню">&#9776;</button>
      <nav class="burger-nav">
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="about.html">О сервисе</a></li>
          <li><a href="#">Доставка</a></li>
          <li><a href="cart.html">Корзина</a></li>
          <li><a href="register.html">Вход</a></li>
        </ul>
      </nav>
    </div>
    
         <script>
      const burgerBtn = document.querySelector('.burger-menu');
      const burgerNav = document.querySelector('.burger-nav');
    
      burgerBtn.addEventListener('click', () => {
        burgerNav.classList.toggle('active');
        burgerBtn.classList.toggle('active');
    
        // Меняем иконку
        if (burgerBtn.classList.contains('active')) {
          burgerBtn.innerHTML = '&#10005;'; // крестик ×
        } else {
          burgerBtn.innerHTML = '&#9776;'; // бургер ≡
        }
      });
    
      // Закрытие меню при клике вне его
      document.addEventListener('click', (e) => {
        if (!burgerBtn.contains(e.target) && !burgerNav.contains(e.target)) {
          burgerNav.classList.remove('active');
          burgerBtn.classList.remove('active');
          burgerBtn.innerHTML = '&#9776;'; // вернуть иконку бургер
        }
      });
    </script>
      </header>
    </div>
    <div class="season-banner"></div>
    <script>
        const banner = document.querySelector('.season-banner');
    const month = new Date().getMonth() + 1; // месяц 1–12
    
    let seasonImg = '';
    
    if (month >= 3 && month <= 5) {
      seasonImg = 'images/spring.jpg';  // Весна: март, апрель, май
    } else if (month >= 6 && month <= 8) {
      seasonImg = 'images/summer.jpg';  // Лето: июнь, июль, август
    } else if (month >= 9 && month <= 11) {
      seasonImg = 'images/autumn.jpg';  // Осень: сентябрь, октябрь, ноябрь
    } else {
      seasonImg = 'images/winter.jpg';  // Зима: декабрь, январь, февраль
    }
    
    banner.style.backgroundImage = `url(${seasonImg})`;
    </script>
    <main>
      <h1>Контакты</h1>
    
      <div class="contact-info">
        <div class="contact-item">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 4.5 7 13 7 13s7-8.5 7-13c0-3.87-3.13-7-7-7zM12 11.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
          Казань, ул. Цветочная, 15
        </div>
        <div class="contact-item">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21c1.2.48 2.5.74 3.85.74a1 1 0 011 1v3.5a1 1 0 01-1 1C10.07 20.5 3.5 13.93 3.5 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.35.26 2.65.74 3.85a1 1 0 01-.12 1.04z"/></svg>
          +7 (495) 123-45-67
        </div>
        <div class="contact-item">
          <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2v.01L12 13 4 6.01V6h16z"/></svg>
          info@flowershop.ru
        </div>
      </div>
    
      <form id="contact-form" action="#" method="POST">
        <label for="name">Имя</label>
        <input type="text" id="name" name="name" required placeholder="Ваше имя" />
    
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="Ваш email" />
    
        <label for="message">Сообщение</label>
        <textarea id="message" name="message" required placeholder="Ваше сообщение"></textarea>
    
        <button type="submit" class="submit-btn">Отправить</button>
      </form>
    </main>
    
    <footer>
      &copy; 2025 FlowerShop. Все права защищены.
    </footer>
    <script>
      function getSeason() {
        const month = new Date().getMonth() + 1;
        if (month >= 3 && month <= 5) {
          return 'spring';
        } else if (month >= 6 && month <= 8) {
          return 'summer';
        } else if (month >= 9 && month <= 11) {
          return 'autumn';
        } else {
          return 'winter';
        }
      }
    
      document.addEventListener("DOMContentLoaded", () => {
        const season = getSeason();
        document.body.classList.add(season);
      });
    </script>
    </body>
    </html>
    


    <script src="assets/js/app.min.js"></script>

</body>
</html>
